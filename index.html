<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="content">
        <div class="left-side">
            <img src="assets/img/PICTURE.png" alt="Developer photo" class="photo">
        </div>

        <div class="right-side">
            <p class="name">I'm José Silva,</p> 
            <h1 class="highlight">A FRONTEND <br> DEVELOPER</h1> 
            <p class="about">who dreams big and works hard to achieve my objectives!</p>
            
            <div class="quick-tools">
                <button class="social" id="github"><img src="assets/img/github-icon.png" alt="GITHUB"></button>
                <button class="social" id="linkedin"><img src="assets/img/linkedin-icon.png" alt="LINKEDIN"></button>
                <button class="social" id="curriculum"><img src="assets/img/curriculum-icon.png" alt="CURRICULO"></button>
                <button class="projects">See my projects</button>
            </div>
        </div>
    </div>
    <div class="modal none">
        <h1>Download</h1>
        <img src="assets/img/close-icon.png" alt="close" id="close">
        <div class="modal-content">
            <div class="l-side">
                <h3>Portuguese Curriculum:</h3>
                <a href="assets/img/Curriculo.pdf" download="currículo" class="download-btn">
                    <img src="assets/img/download-icon.png" alt="icon" class="icon">
                </a>
            </div>
            <div class="r-side">
                <h3>English Curriculum:</h3>
                <a href="assets/img/Curriculum.pdf" download="curriculum" class="download-btn">
                    <img src="assets/img/download-icon.png" alt="icon" class="icon">
                </a>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
