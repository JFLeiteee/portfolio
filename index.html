<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="content">
        <div class="left-side">
            <img src="assets/img/PICTURE.png" alt="Developer photo" class="photo">

            <p class="name">I'm José Silva,</p> 
            <h1 class="highlight">A FRONTEND <br> DEVELOPER</h1>

            <div class="quick-tools">
                <button class="social"><img src="assets/img/github-icon.png" alt="GITHUB"></button>
                <button class="social"><img src="assets/img/linkedin-icon.png" alt="LINKEDIN"></button>
                <button class="social"><img src="assets/img/curriculum-icon.png" alt="CURRICULO"></button>
                <button class="projects">See my projects</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
